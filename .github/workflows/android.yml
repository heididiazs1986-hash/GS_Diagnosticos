name: Generar APK GS Diagnósticos

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar proyecto Capacitor
        run: |
          mkdir -p apk-build/www
          shopt -s extglob dotglob

          # Copia la app web al directorio www, excluyendo carpetas de GitHub/Git.
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='apk-build' \
            ./ apk-build/www/

          cd apk-build

          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          npx cap init "GS Diagnósticos" "com.gsocial.gsdiagnosticos" --web-dir=www
          npx cap add android

          # Permisos útiles para GS Diagnósticos: GPS, cámara, internet y archivos.
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          python3 - <<'PY'
          from pathlib import Path

          p = Path("android/app/src/main/AndroidManifest.xml")
          txt = p.read_text()

          perms = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />',
              '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />'
          ]

          for perm in perms:
              if perm not in txt:
                  txt = txt.replace("<manifest", perm + "\n<manifest", 1)

          txt = txt.replace('android:label="@string/app_name"', 'android:label="GS Diagnósticos"')
          txt = txt.replace('android:allowBackup="true"', 'android:allowBackup="true"')
          txt = txt.replace('android:usesCleartextTraffic="true"', 'android:usesCleartextTraffic="true"')

          p.write_text(txt)
          PY

          # Nombre visible de la app
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/res/values/strings.xml")
          txt = p.read_text()
          txt = txt.replace("<string name=\"app_name\">GS Diagnósticos</string>", "<string name=\"app_name\">GS Diagnósticos</string>")
          txt = txt.replace("<string name=\"title_activity_main\">GS Diagnósticos</string>", "<string name=\"title_activity_main\">GS Diagnósticos</string>")
          p.write_text(txt)
          PY

          npx cap sync android

      - name: Compilar APK debug
        run: |
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: GS-Diagnosticos-APK-debug
          path: apk-build/android/app/build/outputs/apk/debug/app-debug.apk
