name: Generar APK GS Diagnósticos

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar proyecto Capacitor
        run: |
          set -e
          mkdir -p apk-build/www

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='apk-build' \
            ./ apk-build/www/

          cd apk-build

          # Si el archivo quedó con tilde por traducción del navegador, crear copia correcta.
          if [ -f "www/índice.html" ] && [ ! -f "www/index.html" ]; then
            cp "www/índice.html" "www/index.html"
          fi

          # Verificación mínima para evitar APK en blanco.
          if [ ! -f "www/index.html" ]; then
            echo "ERROR: No existe www/index.html. Renombra índice.html a index.html en el repositorio."
            exit 1
          fi

          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

          npx cap init "GS Diagnósticos" "com.gsocial.gsdiagnosticos" --web-dir=www
          npx cap add android
          npx cap sync android

      - name: Ajustar nombre y permisos Android
        run: |
          set -e
          cd apk-build

          python3 - <<'PY'
          from pathlib import Path
          import re

          # Nombre visible
          strings = Path("android/app/src/main/res/values/strings.xml")
          txt = strings.read_text(encoding="utf-8")
          txt = re.sub(r'<string name="app_name">.*?</string>', '<string name="app_name">GS Diagnósticos</string>', txt)
          txt = re.sub(r'<string name="title_activity_main">.*?</string>', '<string name="title_activity_main">GS Diagnósticos</string>', txt)
          strings.write_text(txt, encoding="utf-8")

          # Permisos dentro de <manifest>, forma segura.
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          txt = manifest.read_text(encoding="utf-8")

          perms = [
            '<uses-permission android:name="android.permission.INTERNET" />',
            '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
            '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
            '<uses-permission android:name="android.permission.CAMERA" />',
            '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />'
          ]

          missing = [p for p in perms if p not in txt]
          if missing:
            txt = re.sub(r'(<manifest[^>]*>)', r'\1\n    ' + "\n    ".join(missing), txt, count=1)

          manifest.write_text(txt, encoding="utf-8")
          PY

      - name: Compilar APK debug
        run: |
          set -o pipefail
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../../gradle-build.log

      - name: Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GS-Diagnosticos-APK-debug
          path: apk-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Subir log si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GS-Diagnosticos-build-log
          path: gradle-build.log
