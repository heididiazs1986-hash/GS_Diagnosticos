name: Generar APK GS Diagnósticos

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar proyecto Capacitor
        run: |
          mkdir -p apk-build/www
          shopt -s extglob dotglob

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='apk-build' \
            ./ apk-build/www/

          cd apk-build

          # Si por error el archivo está como índice.html, crear copia como index.html
          if [ -f "www/índice.html" ] && [ ! -f "www/index.html" ]; then
            cp "www/índice.html" "www/index.html"
          fi

          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          npx cap init "GS Diagnósticos" "com.gsocial.gsdiagnosticos" --web-dir=www
          npx cap add android

          npx cap sync android

          # Permisos útiles para GS Diagnósticos
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("android/app/src/main/AndroidManifest.xml")
          txt = p.read_text()

          perms = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />',
              '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />'
          ]

          # Insertar permisos DESPUÉS de la etiqueta <manifest ...>, no antes.
          insert = "\n    " + "\n    ".join([perm for perm in perms if perm not in txt]) + "\n"
          if insert.strip():
              txt = re.sub(r'(<manifest[^>]*>)', r'\1' + insert, txt, count=1)

          p.write_text(txt)
          PY

          # Nombre visible de la app
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path("android/app/src/main/res/values/strings.xml")
          txt = p.read_text()
          txt = re.sub(r'<string name="app_name">.*?</string>', '<string name="app_name">GS Diagnósticos</string>', txt)
          txt = re.sub(r'<string name="title_activity_main">.*?</string>', '<string name="title_activity_main">GS Diagnósticos</string>', txt)
          p.write_text(txt)
          PY

          npx cap sync android

      - name: Compilar APK debug
        run: |
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: GS-Diagnosticos-APK-debug
          path: apk-build/android/app/build/outputs/apk/debug/app-debug.apk
