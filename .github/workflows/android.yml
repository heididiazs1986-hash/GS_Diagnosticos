name: Generar APK GS DX

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preparar APK remota con Capacitor
        run: |
          set -e
          mkdir -p apk-build/www
          echo '<!doctype html><html><head><meta charset="utf-8"><title>GS DX</title></head><body>GS DX</body></html>' > apk-build/www/index.html

          cd apk-build
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/filesystem@latest @capacitor/share@latest

          npx cap init "GS DX" "com.gsocial.gsdiagnosticos" --web-dir=www
          npx cap add android

          cat > capacitor.config.json <<'JSON'
          {
            "appId": "com.gsocial.gsdiagnosticos",
            "appName": "GS DX",
            "webDir": "www",
            "server": {
              "url": "https://gsdiagnosticos.vercel.app/",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false
            }
          }
          JSON

          npx cap sync android

      - name: Ajustar nombre, permisos e icono Android
        run: |
          set -e
          cd apk-build

          python3 - <<'PY'
          from pathlib import Path
          import re

          strings = Path("android/app/src/main/res/values/strings.xml")
          txt = strings.read_text(encoding="utf-8")
          txt = re.sub(r'<string name="app_name">.*?</string>', '<string name="app_name">GS DX</string>', txt)
          txt = re.sub(r'<string name="title_activity_main">.*?</string>', '<string name="title_activity_main">GS DX</string>', txt)
          strings.write_text(txt, encoding="utf-8")

          colors = Path("android/app/src/main/res/values/colors.xml")
          if colors.exists():
            c = colors.read_text(encoding="utf-8")
            c = re.sub(r'<color name="ic_launcher_background">.*?</color>', '<color name="ic_launcher_background">#d40000</color>', c)
            colors.write_text(c, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          txt = manifest.read_text(encoding="utf-8")
          perms = [
            '<uses-permission android:name="android.permission.INTERNET" />',
            '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
            '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
            '<uses-permission android:name="android.permission.CAMERA" />',
            '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />'
          ]
          missing = [p for p in perms if p not in txt]
          if missing:
            txt = re.sub(r'(<manifest[^>]*>)', r'\1\n    ' + "\n    ".join(missing), txt, count=1)
          manifest.write_text(txt, encoding="utf-8")
          PY

          python3 -m pip install pillow

          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image

          candidates = [Path("../icon-512.png"), Path("../icono-512.png"), Path("../icon-192.png"), Path("../icono-192.png")]
          icon = next((p for p in candidates if p.exists()), None)
          if icon:
              img = Image.open(icon).convert("RGBA")
              sizes = {"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}
              for folder, size in sizes.items():
                  outdir = Path("android/app/src/main/res") / folder
                  outdir.mkdir(parents=True, exist_ok=True)
                  bg = Image.new("RGBA", (size,size), (212,0,0,255))
                  inner = int(size*0.78)
                  resized = img.resize((inner,inner), Image.LANCZOS)
                  bg.alpha_composite(resized, ((size-inner)//2,(size-inner)//2))
                  for name in ["ic_launcher.png", "ic_launcher_round.png", "ic_launcher_foreground.png"]:
                      bg.save(outdir / name)
              print("Icono Android generado desde:", icon)
          else:
              print("No encontré icono en repo; se usará el default.")
          PY

      - name: Compilar APK debug
        run: |
          set -o pipefail
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../../gradle-build.log

      - name: Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GS-DX-APK-debug
          path: apk-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Subir log si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GS-DX-build-log
          path:
